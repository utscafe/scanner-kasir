<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  margin-top:30px;
  font-size:40px;
}

#reader{
  width:100%;
  max-width:500px;
  margin:30px auto;
}

#status{
  margin-top:20px;
  font-size:30px;
  color:#ffd700;
}

@media(pointer:coarse){

  html{
    zoom:1.3;
  }

  h1{
    font-size:50px;
  }

  #status{
    font-size:40px;
  }

}
</style>
</head>

<body>

<h1>📷 Scan QR Kasir</h1>

<div id="reader"></div>

<div id="status">
  Mengaktifkan kamera...
</div>

<script>

const APP_URL =
"https://script.google.com/macros/s/AKfycbxYVtclFYdr30GQkL28HCZBn-db4i0G4543EoWOVh5Y_HnjssUfGF2-tcbw10YyexwW/exec";

function normalizeQR(qr){

  if(!qr) return "";

  qr = qr.toString().trim();

  try{

    let url = new URL(qr);

    qr =
      url.searchParams.get("sessionId") || qr;

  }catch(e){}

  qr = qr.replace(/[^A-Za-z0-9\-]/g,'');

  let match = qr.match(/SES-[A-Za-z0-9\-]+/i);

  return match ? match[0] : "";
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras()

.then(devices=>{

  if(!devices.length){

    document.getElementById("status").innerHTML =
      "❌ Kamera tidak ditemukan";

    return;
  }

  let cameraId = devices[0].id;

  devices.forEach(d=>{

    if(
      d.label.toLowerCase().includes("back")
    ){
      cameraId = d.id;
    }

  });

  html5QrCode.start(

    cameraId,

    {
      fps:10,
      qrbox:{
        width:250,
        height:250
      }
    },

    function(qr){

      let sessionId = normalizeQR(qr);

      if(!sessionId){

        document.getElementById("status").innerHTML =
          "❌ QR tidak valid";

        return;
      }

      document.getElementById("status").innerHTML =
        "✅ QR terbaca";

      html5QrCode.stop();

      window.location.href =
        APP_URL +
        "?page=kasir&sessionId=" +
        sessionId;

    },

    function(err){
      console.log(err);
    }

  );

})

.catch(err=>{

  document.getElementById("status").innerHTML =
    "❌ Kamera gagal diakses";

  console.log(err);

});

</script>

</body>
</html>
